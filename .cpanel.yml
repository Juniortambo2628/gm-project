---
deployment:
  tasks:
    # 1. Export Target Directories
    - export DEPLOYPATH=/home/zhpebukm/gmconsulting-core/
    - export APIPATH=/home/zhpebukm/gm-consulting.okjtech.co.ke/api/
    
    # 2. Sync Core Backend Files
    - /bin/cp -a backend/* $DEPLOYPATH
    - /bin/cp -a backend/.* $DEPLOYPATH 2>/dev/null || true
    
    # 3. Sync Public API Files
    - /bin/cp -a backend/public/* $APIPATH
    - /bin/cp -a backend/public/.* $APIPATH 2>/dev/null || true
    
    # 4. Install Dependencies & Optimize
    - cd $DEPLOYPATH && composer install --no-dev --optimize-autoloader
    - cd $DEPLOYPATH && php artisan config:cache
    - cd $DEPLOYPATH && php artisan route:cache
    - cd $DEPLOYPATH && php artisan view:cache
