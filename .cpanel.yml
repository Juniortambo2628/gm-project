---
deployment:
  tasks:
    # ==========================================================
    # GM-Consulting cPanel Automated Deployment (Ultra-Reliable)
    # ==========================================================
    # Repository Cloned to: /home/zhpebukm/repositories/gm-project
    # Core Backend target:  /home/zhpebukm/gmconsulting-core
    # API Public target:    /home/zhpebukm/gm-consulting.okjtech.co.ke/api
    # ==========================================================

    # 1. Define target paths
    - export CORE=/home/zhpebukm/gmconsulting-core
    - export API=/home/zhpebukm/gm-consulting.okjtech.co.ke/api

    # 2. Ensure target folders exist using system absolute paths
    - /bin/mkdir -p $CORE
    - /bin/mkdir -p $API

    # 3. Copy Backend Core files (avoiding untracked system tools like rsync)
    - /bin/cp -rf backend/app $CORE/
    - /bin/cp -rf backend/bootstrap $CORE/
    - /bin/cp -rf backend/config $CORE/
    - /bin/cp -rf backend/database $CORE/
    - /bin/cp -rf backend/resources $CORE/
    - /bin/cp -rf backend/routes $CORE/
    - /bin/cp -f  backend/artisan $CORE/
    - /bin/cp -f  backend/composer.json $CORE/
    - /bin/cp -f  backend/composer.lock $CORE/

    # 4. Copy API Public entry point files
    - /bin/cp -rf backend/public/* $API/
    - /bin/cp -f  backend/public/.htaccess $API/ 2>/dev/null || true

    # 5. Ensure required storage & cache directories exist in core
    - /bin/mkdir -p $CORE/storage/app/public/cms
    - /bin/mkdir -p $CORE/storage/framework/cache/data
    - /bin/mkdir -p $CORE/storage/framework/sessions
    - /bin/mkdir -p $CORE/storage/framework/views
    - /bin/mkdir -p $CORE/storage/logs
    - /bin/mkdir -p $CORE/bootstrap/cache

    # 6. Set correct permissions for execution using system utilities
    - /bin/chmod -R 775 $CORE/storage 2>/dev/null || true
    - /bin/chmod -R 775 $CORE/bootstrap/cache 2>/dev/null || true
    - /bin/chmod 755 $CORE/artisan 2>/dev/null || true

    # 7. Maintain storage symlink from API directory to Core storage
    - /bin/ln -sfn $CORE/storage/app/public $API/storage
